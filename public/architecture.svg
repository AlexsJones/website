  <text x="306" y="246" fill="#6e7681"     font-size="11">quorum sensing · task claiming · swarm formation</text>
  <rect x="230" y="274" width="740" height="76"     rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
