    <text x="1095.0" y="466" fill="#3fb950"       font-size="11" text-anchor="middle" font-weight="700">remix</text>
    <text x="1095.0" y="482" fill="#6e7681"       font-size="9" text-anchor="middle">cognitive digest</text>
