  <line x1="174" y1="230.0" x2="1026" y2="230.0"     stroke="#3fb950" stroke-width="1.2" stroke-opacity="0.55"     stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <line x1="174" y1="312.0" x2="1026" y2="312.0"     stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.55"     stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <line x1="1026" y1="394.0" x2="174" y2="394.0"     stroke="#d29922" stroke-width="1.2" stroke-opacity="0.55"     stroke-dasharray="6 4" marker-end="url(#arrow)"/>
