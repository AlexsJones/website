  <rect x="230" y="520" width="740" height="76"     rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.4"/>
  <rect x="242" y="532" width="44" height="52"     rx="6" fill="#0d1117" stroke="#6e7681"/>
