<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Synthetic Membrane — six-layer architecture" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
  <title>Synthetic Membrane — six-layer architecture</title>
  <rect width="1200" height="720" fill="#0d1117"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"       markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/>
