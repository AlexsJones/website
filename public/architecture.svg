  <text x="306" y="164" fill="#6e7681"     font-size="11">anomaly detection · threat gossip · adaptive defense</text>
  <rect x="230" y="192" width="740" height="76"     rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.4"/>
