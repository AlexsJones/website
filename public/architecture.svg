    <text x="1095.0" y="362" fill="#6e7681"       font-size="9" text-anchor="middle">tier · trust · cost</text>
    <rect x="1044" y="387" width="102" height="48"       rx="6" fill="#0d1117" stroke="#58a6ff"/>
    <text x="1095.0" y="406" fill="#58a6ff"       font-size="11" text-anchor="middle" font-weight="700">channels</text>
    <text x="1095.0" y="422" fill="#6e7681"       font-size="9" text-anchor="middle">expose · query</text>
