  <text x="306" y="304" fill="#e6edf3"     font-size="15" font-weight="700">Shared Medium</text>
  <text x="306" y="328" fill="#6e7681"     font-size="11">event log · CRDTs · semantic query · provenance</text>
  <rect x="230" y="356" width="740" height="76"     rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.4"/>
