  <text x="32" y="44" fill="#e6edf3" font-size="22" font-weight="700">Synthetic Membrane — architecture</text>
  <text x="32" y="68" fill="#6e7681" font-size="13">six layers between two agents · default-deny · event-sourced · quorum-coordinated</text>
