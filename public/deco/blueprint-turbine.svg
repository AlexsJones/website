<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" stroke="#141414">
  <!-- Turbine schematic — fine-line cross-section for large low-opacity backgrounds -->
  <circle cx="200" cy="200" r="192" stroke-width="0.75"/>
  <circle cx="200" cy="200" r="160" stroke-width="0.75" stroke-dasharray="4 5"/>
  <circle cx="200" cy="200" r="120" stroke-width="1"/>
  <circle cx="200" cy="200" r="78" stroke-width="0.75"/>
  <circle cx="200" cy="200" r="30" stroke-width="1"/>
  <circle cx="200" cy="200" r="3" fill="#141414" stroke="none"/>

  <!-- centre datum lines with gap -->
  <g stroke-width="0.75">
    <line x1="0" y1="200" x2="164" y2="200"/>
    <line x1="236" y1="200" x2="400" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="164"/>
    <line x1="200" y1="236" x2="200" y2="400"/>
  </g>

  <!-- outer graduation ticks, every 15° -->
  <g stroke-width="0.75">
    <line x1="200" y1="8" x2="200" y2="20"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(15 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(30 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(45 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(60 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(75 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(90 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(105 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(120 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(135 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(150 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(165 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(180 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(195 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(210 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(225 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(240 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(255 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(270 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(285 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(300 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(315 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(330 200 200)"/>
    <line x1="200" y1="8" x2="200" y2="20" transform="rotate(345 200 200)"/>
  </g>

  <!-- inner spokes, every 30° -->
  <g stroke-width="0.5">
    <line x1="200" y1="82" x2="200" y2="118"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(30 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(60 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(90 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(120 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(150 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(180 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(210 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(240 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(270 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(300 200 200)"/>
    <line x1="200" y1="82" x2="200" y2="118" transform="rotate(330 200 200)"/>
  </g>

  <!-- blade row between r120 and r160, every 30° -->
  <g stroke-width="0.75">
    <rect x="191" y="43" width="18" height="34" rx="2"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(30 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(60 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(90 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(120 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(150 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(180 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(210 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(240 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(270 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(300 200 200)"/>
    <rect x="191" y="43" width="18" height="34" rx="2" transform="rotate(330 200 200)"/>
  </g>

  <!-- cardinal datum squares -->
  <g fill="#141414" stroke="none">
    <rect x="197" y="30" width="6" height="6"/>
    <rect x="197" y="364" width="6" height="6"/>
    <rect x="30" y="197" width="6" height="6"/>
    <rect x="364" y="197" width="6" height="6"/>
  </g>
</svg>
