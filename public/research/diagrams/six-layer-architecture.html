<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six-Layer Architecture — Synthetic Membrane</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020617;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1100px; width: 100%; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 20px;
  }
  svg { width: 100%; height: auto; }
  footer {
    margin-top: 16px;
    text-align: right;
    font-size: 10px;
    color: #334155;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Six-Layer Architecture</h1>
  <p class="subtitle">The Synthetic Membrane — layered substrate for multi-agent coordination</p>

<svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrowViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
    <marker id="arrowRose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fb7185"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fb923c"/>
    </marker>
    <!-- Gradients for layers -->
    <linearGradient id="gradGov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradDisc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradPerm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradMedium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradCoord" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradImmune" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Dashed pattern -->
    <pattern id="dotGrid" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#334155"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1060" height="780" fill="#020617" rx="8"/>

  <!-- ==================== LAYERS (Top to Bottom) ==================== -->

  <!-- L-1: GOVERNANCE -->
  <g id="layer-governance">
    <rect x="40" y="28" width="860" height="80" rx="6" fill="url(#gradGov)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="40" y="28" width="6" height="80" rx="3" fill="#22d3ee" opacity="0.8"/>
    <text x="60" y="54" fill="#22d3ee" font-size="11" font-weight="700">L−1 · GOVERNANCE</text>
    <text x="60" y="74" fill="#94a3b8" font-size="9.5">circuit breakers</text>
    <text x="180" y="74" fill="#94a3b8" font-size="9.5">human override</text>
    <text x="320" y="74" fill="#94a3b8" font-size="9.5">dissent surface</text>
    <text x="460" y="74" fill="#94a3b8" font-size="9.5">value-conflict detection</text>
    <text x="660" y="74" fill="#94a3b8" font-size="9.5">accountability log</text>
    <text x="860" y="74" fill="#94a3b8" font-size="9.5" opacity="0.5">NIMS Unified Command</text>
  </g>

  <!-- Arrow: L1 → L-1 -->
  <line x1="920" y1="108" x2="920" y2="128" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowViolet)"/>

  <!-- L0: DISCOVERY/REGISTRY -->
  <g id="layer-discovery">
    <rect x="40" y="128" width="860" height="80" rx="6" fill="url(#gradDisc)" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="40" y="128" width="6" height="80" rx="3" fill="#a78bfa" opacity="0.8"/>
    <text x="60" y="154" fill="#a78bfa" font-size="11" font-weight="700">L0 · DISCOVERY / REGISTRY</text>
    <text x="60" y="174" fill="#94a3b8" font-size="9.5">behavioural index</text>
    <text x="220" y="174" fill="#94a3b8" font-size="9.5">execution traces</text>
    <text x="380" y="174" fill="#94a3b8" font-size="9.5">identity / auth</text>
    <text x="530" y="174" fill="#94a3b8" font-size="9.5">capability vectors</text>
    <text x="710" y="174" fill="#94a3b8" font-size="9.5">reputation</text>
  </g>

  <!-- Arrow: L1 → L0 -->
  <line x1="920" y1="208" x2="920" y2="228" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowViolet)"/>

  <!-- L1: PERMEABILITY -->
  <g id="layer-permeability">
    <rect x="40" y="228" width="860" height="88" rx="6" fill="url(#gradPerm)" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="40" y="228" width="6" height="88" rx="3" fill="#fbbf24" opacity="0.8"/>
    <text x="60" y="254" fill="#fbbf24" font-size="11" font-weight="700">L1 · PERMEABILITY</text>
    <text x="60" y="274" fill="#94a3b8" font-size="9.5">expose / subscribe</text>
    <text x="220" y="274" fill="#94a3b8" font-size="9.5">SVAF field-level filters</text>
    <text x="420" y="274" fill="#94a3b8" font-size="9.5">gated permeability</text>
    <text x="600" y="274" fill="#94a3b8" font-size="9.5">default-deny, cost-benefit</text>
    <text x="800" y="274" fill="#fbbf24" font-size="9" font-weight="500">cell membrane model</text>
    <line x1="40" y1="288" x2="900" y2="288" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="308" fill="#64748b" font-size="8.5">Selectivity: accept evidence, reject conclusion. Cognitive digestion — store remix, not raw signal.</text>
  </g>

  <!-- Arrow: L2 → L1 -->
  <line x1="920" y1="316" x2="920" y2="336" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowAmber)"/>

  <!-- L2: SHARED MEDIUM -->
  <g id="layer-shared-medium">
    <rect x="40" y="336" width="860" height="88" rx="6" fill="url(#gradMedium)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="40" y="336" width="6" height="88" rx="3" fill="#34d399" opacity="0.8"/>
    <text x="60" y="362" fill="#34d399" font-size="11" font-weight="700">L2 · SHARED MEDIUM</text>
    <text x="60" y="382" fill="#94a3b8" font-size="9.5">CRDT document store</text>
    <text x="230" y="382" fill="#94a3b8" font-size="9.5">immutable event log</text>
    <text x="420" y="382" fill="#94a3b8" font-size="9.5">CAT7 CMBs</text>
    <text x="540" y="382" fill="#94a3b8" font-size="9.5">lineage hashes</text>
    <text x="680" y="382" fill="#94a3b8" font-size="9.5">semantic + structured index</text>
    <line x1="40" y1="396" x2="900" y2="396" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="416" fill="#64748b" font-size="8.5">Cytoplasm: full provenance · mathematically guaranteed convergence · replayability · blackboard transparency</text>
  </g>

  <!-- Arrow: L3 → L2 -->
  <line x1="920" y1="424" x2="920" y2="444" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowEmerald)"/>

  <!-- L3: COORDINATION -->
  <g id="layer-coordination">
    <rect x="40" y="444" width="860" height="88" rx="6" fill="url(#gradCoord)" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="40" y="444" width="6" height="88" rx="3" fill="#fb923c" opacity="0.8"/>
    <text x="60" y="470" fill="#fb923c" font-size="11" font-weight="700">L3 · COORDINATION</text>
    <text x="60" y="490" fill="#94a3b8" font-size="9.5">quorum sensing</text>
    <text x="190" y="490" fill="#94a3b8" font-size="9.5">task claim / release</text>
    <text x="370" y="490" fill="#94a3b8" font-size="9.5">swarm formation</text>
    <text x="530" y="490" fill="#94a3b8" font-size="9.5">consensus (PAC + dissent)</text>
    <text x="740" y="490" fill="#94a3b8" font-size="9.5">multi-mode coordination</text>
    <line x1="40" y1="504" x2="900" y2="504" stroke="#334155" stroke-width="0.5"/>
    <text x="60" y="524" fill="#64748b" font-size="8.5">Span of control: 3–7 subordinates. Structural reorganisation when fan-out exceeds threshold.</text>
  </g>

  <!-- Arrow: Agents → L3 -->
  <line x1="920" y1="532" x2="920" y2="552" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowOrange)"/>

  <!-- ==================== IMMUNE / OBSERVABILITY (Cross-cutting, RIGHT SIDE) ==================== -->
  <g id="layer-immune">
    <!-- Immune layer spans vertically along the right -->
    <rect x="910" y="28" width="110" height="520" rx="6" fill="url(#gradImmune)" stroke="#fb7185" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="910" y="28" width="6" height="520" rx="3" fill="#fb7185" opacity="0.8"/>

    <!-- Vertical title -->
    <text transform="translate(920, 290) rotate(-90)" fill="#fb7185" font-size="10" font-weight="700" letter-spacing="0.1em">IMMUNE / OBSERVABILITY</text>

    <!-- Sub-items stacked vertically along the right -->
    <text x="924" y="50" fill="#94a3b8" font-size="7.5">anomaly detection</text>
    <text x="924" y="66" fill="#94a3b8" font-size="7.5">cytokine gossip</text>
    <text x="924" y="82" fill="#94a3b8" font-size="7.5">OTel traces &amp; metrics</text>
    <text x="924" y="98" fill="#94a3b8" font-size="7.5">memory cells</text>
    <text x="924" y="114" fill="#94a3b8" font-size="7.5">failure attribution graphs</text>

    <line x1="920" y1="130" x2="1010" y2="130" stroke="#334155" stroke-width="0.5"/>

    <text x="924" y="148" fill="#64748b" font-size="7">quarantine</text>
    <text x="924" y="160" fill="#64748b" font-size="7">adaptive defence</text>
    <text x="924" y="172" fill="#64748b" font-size="7">spore attack mitigation</text>

    <!-- Connection dots to each layer -->
    <circle cx="910" cy="68" r="3" fill="#fb7185" opacity="0.6"/>
    <circle cx="910" cy="168" r="3" fill="#fb7185" opacity="0.6"/>
    <circle cx="910" cy="272" r="3" fill="#fb7185" opacity="0.6"/>
    <circle cx="910" cy="380" r="3" fill="#fb7185" opacity="0.6"/>
    <circle cx="910" cy="488" r="3" fill="#fb7185" opacity="0.6"/>
  </g>

  <!-- ==================== COMMUNICATION ARROWS ==================== -->
  <!-- Agent → Layer arrows -->
  <g id="agent-arrows">
    <!-- Agent A arrows -->
    <path d="M140,680 Q140,552 140,532" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>
    <path d="M140,680 Q140,444 140,424" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>
    <path d="M140,680 Q140,336 140,316" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>
    <path d="M140,680 Q140,228 140,208" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>
    <path d="M140,680 Q140,128 140,108" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>
    <path d="M140,680 Q140,28 140,48" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>

    <!-- Agent B arrows -->
    <path d="M500,680 Q500,552 500,532" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEmerald)"/>
    <path d="M500,680 Q500,444 500,424" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEmerald)"/>
    <path d="M500,680 Q500,336 500,316" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEmerald)"/>
    <path d="M500,680 Q500,228 500,208" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEmerald)"/>
    <path d="M500,680 Q500,128 500,108" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEmerald)"/>
    <path d="M500,680 Q500,28 500,48" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEmerald)"/>

    <!-- Agent C arrows -->
    <path d="M860,680 Q860,552 860,532" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
    <path d="M860,680 Q860,444 860,424" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
    <path d="M860,680 Q860,336 860,316" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
    <path d="M860,680 Q860,228 860,208" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
    <path d="M860,680 Q860,128 860,108" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
    <path d="M860,680 Q860,28 860,48" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowViolet)"/>
  </g>

  <!-- ==================== AGENT BOXES ==================== -->
  <!-- Agent A -->
  <g id="agent-a">
    <rect x="80" y="648" width="120" height="56" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="140" y="672" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">AGENT A</text>
    <text x="140" y="688" fill="#64748b" font-size="8" text-anchor="middle">MCP / A2A / Native</text>
  </g>

  <!-- Agent B -->
  <g id="agent-b">
    <rect x="440" y="648" width="120" height="56" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="500" y="672" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">AGENT B</text>
    <text x="500" y="688" fill="#64748b" font-size="8" text-anchor="middle">MCP / A2A / Native</text>
  </g>

  <!-- Agent C -->
  <g id="agent-c">
    <rect x="800" y="648" width="120" height="56" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="860" y="672" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">AGENT C</text>
    <text x="860" y="688" fill="#64748b" font-size="8" text-anchor="middle">MCP / A2A / Native</text>
  </g>

  <!-- Communication between agents -->
  <line x1="200" y1="676" x2="440" y2="676" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="676" x2="800" y2="676" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="320" y="670" fill="#475569" font-size="7.5" text-anchor="middle">ambient sensing via shared medium</text>
  <text x="680" y="670" fill="#475569" font-size="7.5" text-anchor="middle">ambient sensing via shared medium</text>

  <!-- ==================== LEGEND ==================== -->
  <g id="legend" transform="translate(40, 730)">
    <rect x="0" y="0" width="980" height="38" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="16" y="16" fill="#94a3b8" font-size="8" font-weight="700">LEGEND</text>
    <!-- Layer colors -->
    <rect x="16" y="22" width="10" height="8" rx="2" fill="#22d3ee" opacity="0.7"/>
    <text x="32" y="30" fill="#64748b" font-size="7.5">Governance (L−1)</text>
    <rect x="130" y="22" width="10" height="8" rx="2" fill="#a78bfa" opacity="0.7"/>
    <text x="146" y="30" fill="#64748b" font-size="7.5">Discovery (L0)</text>
    <rect x="240" y="22" width="10" height="8" rx="2" fill="#fbbf24" opacity="0.7"/>
    <text x="256" y="30" fill="#64748b" font-size="7.5">Permeability (L1)</text>
    <rect x="360" y="22" width="10" height="8" rx="2" fill="#34d399" opacity="0.7"/>
    <text x="376" y="30" fill="#64748b" font-size="7.5">Shared Medium (L2)</text>
    <rect x="500" y="22" width="10" height="8" rx="2" fill="#fb923c" opacity="0.7"/>
    <text x="516" y="30" fill="#64748b" font-size="7.5">Coordination (L3)</text>
    <rect x="640" y="22" width="10" height="8" rx="2" fill="#fb7185" opacity="0.7"/>
    <text x="656" y="30" fill="#64748b" font-size="7.5">Immune / Observability</text>
    <!-- Arrow legend -->
    <line x1="800" y1="26" x2="820" y2="26" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="826" y="30" fill="#64748b" font-size="7.5">Agent→Layer communication</text>
  </g>

  <!-- ==================== BRANDING ==================== -->
  <text x="1020" y="768" fill="#1e293b" font-size="8" text-anchor="end">Synthetic Membrane</text>
</svg>

<footer>Synthetic Membrane — Architecture Diagram v1.0</footer>
</div>
</body>
</html>
