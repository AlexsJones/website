<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMB Permeability Flow — Synthetic Membrane</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020617;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1100px; width: 100%; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 20px;
  }
  svg { width: 100%; height: auto; }
  footer {
    margin-top: 16px;
    text-align: right;
    font-size: 10px;
    color: #334155;
  }
</style>
</head>
<body>
<div class="container">
  <h1>CMB Permeability Flow</h1>
  <p class="subtitle">How a Cognitive Memory Block flows through the SVAF filter — field-level selective permeability</p>

<svg viewBox="0 0 1100 860" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fb7185"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
    <linearGradient id="gradCMB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="gradFilter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="gradAgentB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="gradAccept" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradReject" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="#020617" rx="8"/>

  <!-- ==================== PHASE LABELS ==================== -->
  <text x="50" y="30" fill="#64748b" font-size="8" font-weight="700">PHASE 1: SOURCE</text>
  <text x="480" y="30" fill="#64748b" font-size="8" font-weight="700">PHASE 2: FILTER</text>
  <text x="780" y="30" fill="#64748b" font-size="8" font-weight="700">PHASE 3: DESTINATION</text>

  <!-- Phase separators -->
  <line x1="350" y1="10" x2="350" y2="820" stroke="#1e293b" stroke-width="1"/>
  <line x1="720" y1="10" x2="720" y2="820" stroke="#1e293b" stroke-width="1"/>

  <!-- ==================== PHASE 1: AGENT A'S CMB ==================== -->
  <g id="phase1">
    <!-- Agent A box -->
    <rect x="40" y="48" width="290" height="36" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="185" y="70" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">AGENT A — CMB Source</text>
    <text x="185" y="84" fill="#64748b" font-size="8" text-anchor="middle">CAT7 Schema · content-hash ID</text>

    <!-- CAT7 Schema fields -->
    <rect x="40" y="96" width="290" height="340" rx="6" fill="url(#gradCMB)" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Field rows -->
    <g id="cat7-fields">
      <!-- content_hash -->
      <rect x="56" y="110" width="258" height="28" rx="3" fill="#1e293b" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.4"/>
      <text x="68" y="128" fill="#fbbf24" font-size="9" font-weight="700">content_hash</text>
      <text x="190" y="128" fill="#475569" font-size="8">→</text>
      <text x="200" y="128" fill="#94a3b8" font-size="8">sha3-256("evidence+metadata")</text>
      <rect x="280" y="116" width="28" height="16" rx="2" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="0.5"/>
      <text x="294" y="128" fill="#fbbf24" font-size="6.5" text-anchor="middle">KEY</text>

      <!-- parents -->
      <rect x="56" y="146" width="258" height="28" rx="3" fill="#1e293b" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="68" y="164" fill="#a78bfa" font-size="9" font-weight="500">parents</text>
      <text x="160" y="164" fill="#475569" font-size="8">→</text>
      <text x="170" y="164" fill="#94a3b8" font-size="8">[hash₁, hash₂] — lineage</text>

      <!-- ancestors -->
      <rect x="56" y="182" width="258" height="28" rx="3" fill="#1e293b" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="68" y="200" fill="#a78bfa" font-size="9" font-weight="500">ancestors</text>
      <text x="165" y="200" fill="#475569" font-size="8">→</text>
      <text x="175" y="200" fill="#94a3b8" font-size="8">full chain of provenance</text>

      <!-- evidence -->
      <rect x="56" y="218" width="258" height="28" rx="3" fill="#1e293b" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.5"/>
      <text x="68" y="236" fill="#34d399" font-size="9" font-weight="700">evidence</text>
      <text x="160" y="236" fill="#475569" font-size="8">→</text>
      <text x="170" y="236" fill="#94a3b8" font-size="8">raw data, observations, sources</text>
      <rect x="280" y="224" width="28" height="16" rx="2" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="0.5"/>
      <text x="294" y="236" fill="#34d399" font-size="6.5" text-anchor="middle">ACCEPT</text>

      <!-- conclusion -->
      <rect x="56" y="254" width="258" height="28" rx="3" fill="#1e293b" stroke="#fb7185" stroke-width="0.5" stroke-opacity="0.5"/>
      <text x="68" y="272" fill="#fb7185" font-size="9" font-weight="700">conclusion</text>
      <text x="165" y="272" fill="#475569" font-size="8">→</text>
      <text x="175" y="272" fill="#94a3b8" font-size="8">agent's inference, judgement</text>
      <rect x="280" y="260" width="28" height="16" rx="2" fill="#fb7185" fill-opacity="0.15" stroke="#fb7185" stroke-width="0.5"/>
      <text x="294" y="272" fill="#fb7185" font-size="6.5" text-anchor="middle">REJECT</text>

      <!-- metadata -->
      <rect x="56" y="290" width="258" height="28" rx="3" fill="#1e293b" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.5"/>
      <text x="68" y="308" fill="#34d399" font-size="9" font-weight="700">metadata</text>
      <text x="160" y="308" fill="#475569" font-size="8">→</text>
      <text x="170" y="308" fill="#94a3b8" font-size="8">role, timestamp, confidence</text>
      <rect x="280" y="296" width="28" height="16" rx="2" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="0.5"/>
      <text x="294" y="308" fill="#34d399" font-size="6.5" text-anchor="middle">ACCEPT</text>

      <!-- confidence -->
      <rect x="56" y="326" width="258" height="28" rx="3" fill="#1e293b" stroke="#94a3b8" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="68" y="344" fill="#94a3b8" font-size="9" font-weight="500">confidence</text>
      <text x="175" y="344" fill="#475569" font-size="8">→</text>
      <text x="185" y="344" fill="#94a3b8" font-size="8">0.0 — 1.0 scalar</text>

      <!-- timestamp -->
      <rect x="56" y="362" width="258" height="28" rx="3" fill="#1e293b" stroke="#94a3b8" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="68" y="380" fill="#94a3b8" font-size="9" font-weight="500">timestamp</text>
      <text x="170" y="380" fill="#475569" font-size="8">→</text>
      <text x="180" y="380" fill="#94a3b8" font-size="8">ISO 8601 / event clock</text>
    </g>

    <!-- SVAF label -->
    <rect x="40" y="448" width="290" height="24" rx="3" fill="#fbbf24" fill-opacity="0.05" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="185" y="464" fill="#fbbf24" font-size="8" text-anchor="middle">SVAF = Selectivity + Validation + Anchoring + Filtering</text>

    <!-- Arrow down -->
    <line x1="185" y1="472" x2="185" y2="500" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
    <text x="185" y="492" fill="#64748b" font-size="7" text-anchor="middle">serialize</text>
  </g>

  <!-- ==================== PHASE 2: SVAF FILTER ==================== -->
  <g id="phase2">
    <!-- Filter box -->
    <rect x="380" y="50" width="320" height="430" rx="8" fill="url(#gradFilter)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="380" y="50" width="5" height="430" rx="2" fill="#22d3ee" opacity="0.7"/>

    <text x="540" y="78" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">SVAF FILTER</text>
    <text x="540" y="96" fill="#64748b" font-size="8" text-anchor="middle">Field-level evaluation against role-indexed anchors</text>

    <!-- Filter sub-components -->
    <rect x="395" y="110" width="290" height="32" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="408" y="130" fill="#22d3ee" font-size="9" font-weight="500">1. ROLE CHECK</text>
    <text x="520" y="130" fill="#64748b" font-size="8">Is Agent B authorised to receive from Agent A?</text>

    <rect x="395" y="150" width="290" height="32" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="408" y="170" fill="#22d3ee" font-size="9" font-weight="500">2. FIELD SPLIT</text>
    <text x="520" y="170" fill="#64748b" font-size="8">Deconstruct CMB into individual fields</text>

    <rect x="395" y="190" width="290" height="32" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="408" y="210" fill="#22d3ee" font-size="9" font-weight="500">3. ANCHOR MATCH</text>
    <text x="520" y="210" fill="#64748b" font-size="8">Does each field match a role-indexed anchor?</text>

    <rect x="395" y="230" width="290" height="32" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="408" y="250" fill="#22d3ee" font-size="9" font-weight="500">4. COST-BENEFIT</text>
    <text x="520" y="250" fill="#64748b" font-size="8">Is the token cost worth the information gain?</text>

    <rect x="395" y="270" width="290" height="32" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="408" y="290" fill="#22d3ee" font-size="9" font-weight="500">5. DEFAULT-DENY</text>
    <text x="520" y="290" fill="#64748b" font-size="8">Reject fields without explicit permit</text>

    <!-- Decision tree -->
    <text x="540" y="330" fill="#64748b" font-size="8" font-weight="700" text-anchor="middle">DECISION TREE</text>

    <!-- evidence → ACCEPT -->
    <rect x="410" y="345" width="130" height="28" rx="4" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="475" y="363" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">evidence → ✓ ACCEPT</text>
    <text x="475" y="378" fill="#64748b" font-size="7" text-anchor="middle">matches anchor</text>

    <!-- conclusion → REJECT -->
    <rect x="560" y="345" width="130" height="28" rx="4" fill="#fb7185" fill-opacity="0.1" stroke="#fb7185" stroke-width="1" stroke-opacity="0.5"/>
    <text x="625" y="363" fill="#fb7185" font-size="9" font-weight="700" text-anchor="middle">conclusion → ✗ REJECT</text>
    <text x="625" y="378" fill="#64748b" font-size="7" text-anchor="middle">no anchor match</text>

    <!-- metadata → ACCEPT -->
    <rect x="410" y="385" width="130" height="28" rx="4" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="475" y="403" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">metadata → ✓ ACCEPT</text>
    <text x="475" y="418" fill="#64748b" font-size="7" text-anchor="middle">always allowed</text>

    <!-- confidence → ACCEPT -->
    <rect x="560" y="385" width="130" height="28" rx="4" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <text x="625" y="403" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">confidence → ✓ ACCEPT</text>
    <text x="625" y="418" fill="#64748b" font-size="7" text-anchor="middle">always allowed</text>

    <!-- Hash check -->
    <rect x="410" y="425" width="280" height="28" rx="4" fill="#1e293b" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="423" y="443" fill="#a78bfa" font-size="9" font-weight="500">content_hash → VERIFY</text>
    <text x="590" y="443" fill="#64748b" font-size="7">integrity check</text>

    <line x1="540" y1="510" x2="540" y2="530" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
    <text x="540" y="525" fill="#64748b" font-size="7" text-anchor="middle">forward partial CMB</text>
  </g>

  <!-- ==================== PHASE 3: AGENT B ==================== -->
  <g id="phase3">
    <!-- Arrow from filter to Agent B -->
    <line x1="720" y1="540" x2="860" y2="540" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
    <text x="790" y="535" fill="#64748b" font-size="7" text-anchor="middle">partial CMB</text>

    <!-- Agent B's stored CMB (after filtering) -->
    <rect x="740" y="548" width="320" height="28" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="900" y="568" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">AGENT B — CMB Destination</text>

    <!-- What Agent B receives (partial) -->
    <rect x="740" y="584" width="320" height="140" rx="6" fill="url(#gradAccept)" stroke="#34d399" stroke-width="1" stroke-opacity="0.3"/>
    <text x="756" y="604" fill="#34d399" font-size="9" font-weight="700">RECEIVED (ACCEPTED fields)</text>

    <!-- Accepted fields -->
    <rect x="756" y="612" width="288" height="22" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="768" y="627" fill="#34d399" font-size="8.5" font-weight="500">✓ evidence</text>
    <text x="860" y="627" fill="#64748b" font-size="8">raw observations, sources</text>

    <rect x="756" y="640" width="288" height="22" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="768" y="655" fill="#34d399" font-size="8.5" font-weight="500">✓ metadata</text>
    <text x="860" y="655" fill="#64748b" font-size="8">role, timestamp, confidence</text>

    <rect x="756" y="668" width="288" height="22" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="768" y="683" fill="#34d399" font-size="8.5" font-weight="500">✓ confidence</text>
    <text x="860" y="683" fill="#64748b" font-size="8">0.0 — 1.0 scalar</text>

    <rect x="756" y="696" width="288" height="22" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="768" y="711" fill="#34d399" font-size="8.5" font-weight="500">✓ content_hash</text>
    <text x="860" y="711" fill="#64748b" font-size="8">integrity verified</text>

    <rect x="756" y="724" width="288" height="22" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="768" y="739" fill="#34d399" font-size="8.5" font-weight="500">✓ parents</text>
    <text x="860" y="739" fill="#64748b" font-size="8">lineage preserved</text>

    <!-- What was rejected -->
    <rect x="740" y="734" width="320" height="40" rx="6" fill="url(#gradReject)" stroke="#fb7185" stroke-width="1" stroke-opacity="0.3"/>
    <text x="756" y="752" fill="#fb7185" font-size="9" font-weight="700">REJECTED (blocked by SVAF)</text>
    <text x="756" y="768" fill="#fb7185" font-size="8">✗ conclusion — no anchor match for Agent B's role</text>

    <!-- Arrow down -->
    <line x1="900" y1="780" x2="900" y2="800" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

    <!-- Agent B stores interpretation -->
    <rect x="740" y="800" width="320" height="36" rx="6" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
    <text x="900" y="816" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">Agent B stores interpretation (remix)</text>
    <text x="900" y="830" fill="#64748b" font-size="8">not raw signal — cognitive digestion</text>
  </g>

  <!-- ==================== BRANDING ==================== -->
  <text x="1060" y="848" fill="#1e293b" font-size="8" text-anchor="end">Synthetic Membrane</text>
</svg>

<footer>Synthetic Membrane — CMB Permeability Flow v1.0</footer>
</div>
</body>
</html>
