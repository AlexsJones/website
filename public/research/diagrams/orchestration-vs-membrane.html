<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestration vs Membrane — Synthetic Membrane</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020617;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1160px; width: 100%; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 20px;
  }
  svg { width: 100%; height: auto; }
  footer {
    margin-top: 16px;
    text-align: right;
    font-size: 10px;
    color: #334155;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Orchestration vs Synthetic Membrane</h1>
  <p class="subtitle">Two paradigms for multi-agent coordination — moving messages vs shared understanding</p>

<svg viewBox="0 0 1160 820" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arrowRose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">

    </marker>
    <marker id="arrowEmerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>

    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>

    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22d3ee"/>

      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gradCentral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="gradCyto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1160" height="820" fill="#020617" rx="8"/>

    <text x="295" y="41" fill="#fb7185" font-size="12" font-weight="700" text-anchor="middle">CURRENT: ORCHESTRATION</text>
    <text x="295" y="56" fill="#475569" font-size="8" text-anchor="middle">LangGraph · CrewAI · AutoGen</text>

    <!-- Central Orchestrator -->
    <rect x="215" y="75" width="160" height="50" rx="8" fill="url(#gradCentral)" stroke="#fb7185" stroke-width="1.5" filter="url(#glowRed)"/>
    <text x="295" y="97" fill="#fb7185" font-size="11" font-weight="700" text-anchor="middle">ORCHESTRATOR</text>
    <text x="295" y="115" fill="#94a3b8" font-size="8" text-anchor="middle">centralised state holder</text>

    <!-- Bottleneck indicator -->

    <text x="295" y="141" fill="#fb7185" font-size="7.5" text-anchor="middle">⚠ BOTTLENECK</text>

    <text x="110" y="192" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">Agent 1</text>
    <text x="110" y="204" fill="#475569" font-size="7" text-anchor="middle">private context</text>

    <!-- Agent 2 (top-right) -->
    <rect x="400" y="170" width="100" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="450" y="192" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">Agent 2</text>
    <text x="450" y="204" fill="#475569" font-size="7" text-anchor="middle">private context</text>

    <!-- Agent 3 (mid-left) -->

    <text x="110" y="262" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">Agent 3</text>
    <text x="110" y="274" fill="#475569" font-size="7" text-anchor="middle">private context</text>

    <!-- Agent 4 (mid-right) -->
    <rect x="400" y="240" width="100" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="450" y="262" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">Agent 4</text>
    <text x="450" y="274" fill="#475569" font-size="7" text-anchor="middle">private context</text>

    <!-- Agent 5 (bottom-left) -->
    <rect x="60" y="310" width="100" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="110" y="332" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">Agent 5</text>
    <text x="110" y="344" fill="#475569" font-size="7" text-anchor="middle">private context</text>

    <!-- Agent 6 (bottom-right) -->
    <rect x="400" y="310" width="100" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="450" y="332" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">Agent 6</text>
    <text x="450" y="344" fill="#475569" font-size="7" text-anchor="middle">private context</text>

    <!-- Arrows: all agents → orchestrator (top-down flow) -->
    <!-- Agent 1 → Orchestrator -->
    <path d="M110,170 Q110,140 295,125" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrowRose)" stroke-dasharray="4,2"/>
    <!-- Agent 2 → Orchestrator -->
    <path d="M450,170 Q450,140 295,125" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrowRose)" stroke-dasharray="4,2"/>
    <!-- Agent 3 → Orchestrator -->
    <path d="M110,240 Q110,195 295,155" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrowRose)" stroke-dasharray="4,2"/>
    <!-- Agent 4 → Orchestrator -->
    <path d="M450,240 Q450,195 295,155" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrowRose)" stroke-dasharray="4,2"/>
    <!-- Agent 5 → Orchestrator -->
    <path d="M110,310 Q110,250 295,185" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrowRose)" stroke-dasharray="4,2"/>
    <!-- Agent 6 → Orchestrator -->
    <path d="M450,310 Q450,250 295,185" fill="none" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arrowRose)" stroke-dasharray="4,2"/>

    <!-- Cross-agent communication via orchestrator (Agent 1 → Agent 2) -->
    <path d="M110,206 Q110,280 295,310" fill="none" stroke="#fb7185" stroke-width="0.8" stroke-opacity="0.3" marker-end="url(#arrowRose)"/>
    <path d="M295,310 Q480,280 450,206" fill="none" stroke="#fb7185" stroke-width="0.8" stroke-opacity="0.3" marker-end="url(#arrowRose)"/>
    <text x="295" y="318" fill="#fb7185" font-size="6.5" text-anchor="middle" opacity="0.5">all comms route here</text>

    <!-- Labels -->
    <rect x="30" y="365" width="220" height="70" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="44" y="383" fill="#fb7185" font-size="8" font-weight="700">PROBLEMS</text>
    <text x="44" y="398" fill="#94a3b8" font-size="8">✗ Centralised state</text>
    <text x="44" y="413" fill="#94a3b8" font-size="8">✗ Top-down flow</text>
    <text x="44" y="428" fill="#94a3b8" font-size="8">✗ Orchestrator-owned</text>
    <text x="44" y="443" fill="#94a3b8" font-size="8">✗ No ambient sensing</text>

    <!-- Metaphor label -->
    <rect x="280" y="365" width="220" height="70" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="294" y="383" fill="#64748b" font-size="8" font-weight="700">METAPHOR</text>
    <text x="294" y="403" fill="#fb7185" font-size="10" font-weight="500">"Moving messages,</text>
    <text x="294" y="420" fill="#fb7185" font-size="10" font-weight="500">not minds"</text>
    <text x="294" y="440" fill="#64748b" font-size="8">Email lattice · Help desk</text>
  </g>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="590" y1="10" x2="590" y2="445" stroke="#1e293b" stroke-width="1"/>
  <text x="590" y="470" fill="#475569" font-size="9" text-anchor="middle" font-weight="700">VS</text>

    <text x="855" y="41" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">SYNTHETIC MEMBRANE</text>
    <text x="855" y="56" fill="#475569" font-size="8" text-anchor="middle">Proposed architecture</text>

    <text x="855" y="102" fill="#34d399" font-size="9" font-weight="500" text-anchor="middle">Agent 1</text>
    <text x="855" y="114" fill="#64748b" font-size="7" text-anchor="middle">agent-owned state</text>

    <!-- Agent 2 (top-right) -->
    <rect x="970" y="135" width="100" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <text x="1020" y="157" fill="#34d399" font-size="9" font-weight="500" text-anchor="middle">Agent 2</text>
    <text x="1020" y="169" fill="#64748b" font-size="7" text-anchor="middle">agent-owned state</text>

    <!-- Agent 3 (mid-right) -->
    <rect x="970" y="225" width="100" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <text x="1020" y="247" fill="#34d399" font-size="9" font-weight="500" text-anchor="middle">Agent 3</text>
    <text x="1020" y="259" fill="#64748b" font-size="7" text-anchor="middle">agent-owned state</text>

    <!-- Agent 4 (bottom-right) -->
    <rect x="970" y="315" width="100" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <text x="1020" y="337" fill="#34d399" font-size="9" font-weight="500" text-anchor="middle">Agent 4</text>
    <text x="1020" y="349" fill="#64748b" font-size="7" text-anchor="middle">agent-owned state</text>

    <!-- Agent 5 (bottom) -->
    <rect x="805" y="370" width="100" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <text x="855" y="392" fill="#34d399" font-size="9" font-weight="500" text-anchor="middle">Agent 5</text>
    <text x="855" y="404" fill="#64748b" font-size="7" text-anchor="middle">agent-owned state</text>

    <!-- Agent 6 (mid-left) -->
    <rect x="640" y="225" width="100" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <text x="690" y="247" fill="#34d399" font-size="9" font-weight="500" text-anchor="middle">Agent 6</text>
    <text x="690" y="259" fill="#64748b" font-size="7" text-anchor="middle">agent-owned state</text>

    <!-- Arrows: agents ↔ shared medium (bidirectional, solid) -->
    <!-- Agent 1 → Medium -->
    <path d="M855,116 L855,130" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
    <!-- Agent 1 ← Medium -->
    <path d="M855,130 L855,116" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

    <!-- Agent 2 → Medium -->
    <path d="M970,153 Q920,170 890,165" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
    <!-- Agent 2 ← Medium -->
    <path d="M970,169 Q920,186 890,181" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

    <!-- Agent 3 → Medium -->
    <path d="M970,243 Q920,235 890,225" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
    <!-- Agent 3 ← Medium -->
    <path d="M970,259 Q920,251 890,241" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

    <!-- Agent 4 → Medium -->
    <path d="M970,333 Q920,310 890,270" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
    <!-- Agent 4 ← Medium -->
    <path d="M970,349 Q920,326 890,286" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

    <!-- Agent 5 → Medium -->
    <path d="M855,386 L855,290" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
    <!-- Agent 5 ← Medium -->
    <path d="M855,290 L855,386" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

    <!-- Agent 6 → Medium -->
    <path d="M740,243 Q780,235 810,225" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
    <!-- Agent 6 ← Medium -->
    <path d="M740,259 Q780,251 810,241" fill="none" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

    <!-- Ambient sensing: dashed bidirectional arrows between agents -->

    <path d="M905,98 Q970,100 970,135" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,3" stroke-opacity="0.4"/>
    <!-- Agent 2 ↔ Agent 3 -->
    <path d="M970,171 L970,225" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,3" stroke-opacity="0.4"/>
    <!-- Agent 3 ↔ Agent 4 -->
    <path d="M970,261 L970,315" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,3" stroke-opacity="0.4"/>

    <!-- Metaphor label -->
    <rect x="840" y="425" width="280" height="70" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="854" y="443" fill="#64748b" font-size="8" font-weight="700">METAPHOR</text>
    <text x="854" y="463" fill="#34d399" font-size="10" font-weight="500">"Shared understanding"</text>
